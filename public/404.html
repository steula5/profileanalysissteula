<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
      // Redirect all 404s to index.html with hash
      var path = window.location.pathname;
      var redirect = path + window.location.hash;
      
      if (!path.includes('.')) {
        // Only redirect non-file requests
        window.location.replace('/#' + path);
      }
    </script>
  </head>
  <body>
  </body>
</html>
